{% extends 'accountability/base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h1 class="gradient-text">Daily Update</h1>
    <p style="opacity: 0.6; margin-bottom: 2rem;">Log your progress to keep your partner updated!</p>

    <form method="post">
        {% csrf_token %}
        <label>What did you achieve today?</label>
        {{ form.achievements }}

        <label>Any bottlenecks?</label>
        {{ form.bottlenecks }}

        <label>Plan for tomorrow?</label>
        {{ form.plan_for_tomorrow }}

        <label>Mood Rating (1-5)</label>
        {{ form.mood_rating }}

        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 1rem;">Submit Update</button>
    </form>
</div>
{% endblock %}
