{% extends 'base.html' %}
{% block title %}Manage System Funds{% endblock %}

{% block content %}
<div class="auth-container" id="manage-funds-container" style="min-height: auto; padding-top: 5rem;">
    <div class="auth-card glass-card animate-fade-in">
        <div class="auth-header">
            <span class="auth-icon">💰</span>
            <h1>Manage Funds</h1>
            <p class="auth-subtitle">Adjust the Admin Bank Balance</p>
        </div>

        <div class="glass-card-inner" style="margin-bottom: 2rem; text-align: center;">
            <p class="stat-label">Current Balance</p>
            <h2 class="stat-value" style="color: var(--success); font-size: 2.5rem;">₹{{ wallet.balance }}</h2>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Transaction Type</label>
                <select name="action" class="form-input">
                    <option value="add">Deposit (Add Funds)</option>
                    <option value="subtract">Withdrawal (Subtract Funds)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" class="form-input" placeholder="0.00" required>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary btn-full">Execute Transaction ⚡</button>
            </div>
        </form>

        <div class="auth-footer">
            <a href="{% url 'admin_panel' %}" class="link">← Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
