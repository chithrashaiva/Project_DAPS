{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card animate-fade-in text-center">
        <div class="auth-header">
            <span class="auth-icon">✅</span>
            <h1>Password Reset Successful</h1>
            <p class="auth-subtitle">Your password has been successfully updated.</p>
        </div>
        <div class="auth-body">
            <p>You can now log in with your new password.</p>
        </div>
        <div class="auth-footer" style="margin-top: 2rem;">
            <a href="{% url 'login' %}" class="btn btn-primary btn-full">Login Now ⚡</a>
        </div>
    </div>
</div>
{% endblock %}
