{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DAPS - Accountability Partner{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'accountability/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div>
            <h2 class="gradient-text" style="margin: 0;">DAPS</h2>
        </div>
        <div>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" style="color: white; margin-right: 1.5rem; text-decoration: none;">Dashboard</a>
                <a href="{% url 'daily_update' %}" style="color: white; margin-right: 1.5rem; text-decoration: none;">Update</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-family: inherit;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" style="color: white; margin-right: 1.5rem; text-decoration: none;">Login</a>
                <a href="{% url 'register' %}" class="btn-premium" style="text-decoration: none;">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
