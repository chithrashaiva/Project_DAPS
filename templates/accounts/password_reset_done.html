{% extends 'base.html' %}
{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card animate-fade-in text-center">
        <div class="auth-header">
            <span class="auth-icon">📧</span>
            <h1>Check Your Email</h1>
            <p class="auth-subtitle">We've sent a password reset link to your email address.</p>
        </div>
        <div class="auth-body">
            <p>If you don't receive an email, please check your spam folder or try again.</p>
        </div>
        <div class="auth-footer" style="margin-top: 2rem;">
            <a href="{% url 'login' %}" class="btn btn-outline btn-full">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
